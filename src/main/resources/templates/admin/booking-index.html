<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block
            th:replace="/admin/fragments/sidebar :: sidebar('Bookings')"
    ></th:block>

    <main class="dashboard">
        <div class="topbar">
            <h1>Bookings</h1>
        </div>

        <section class="dashboard-grid">
            <div class="panel neo-card">
                <h2>Recent Bookings</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Car</th>
                            <th>Status</th>
                            <th>Start Date</th>
                            <th>Return Date</th>
                            <th>Fee</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="booking : ${bookings}"
                            class="clickable-row"
                            onclick="openBookingManageModal(this)"
                            th:data-id="${booking.id}"
                            th:data-car="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}"
                            th:data-status="${booking.status}"
                            th:data-start="${booking.start_date}"
                            th:data-return="${booking.return_date}"
                            th:data-total="${booking.total_amount}"
                            th:data-customer="${booking.customer.username}">
                            <td th:text="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}">Car</td>
                            <td>
                                <span class="status pending" th:text="${booking.status}">Pending</span>
                            </td>
                            <td th:text="${booking.start_date}">2026-03-09</td>
                            <td th:text="${booking.return_date}">2026-03-09</td>
                            <td th:text="${booking.total_amount}">0</td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="5">No pending bookings found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="quick-actions">
                <h2>Quick Action</h2>


                    <div class="action-row"
                     th:each="booking : ${recentBookings}"
                     onclick="openBookingModal(this)"
                     th:data-id="${booking.id}"
                     th:data-user="${booking.customer.username}"
                     th:data-car="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}"
                     th:data-status="${booking.status}"
                     th:data-date="${booking.start_date + ' to ' + booking.end_date}">

                    <span class="cell user-cell"
                          th:text="${booking.customer.username}">
                        User
                    </span>

                    <span class="cell car-cell"
                          th:text="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}">
                        Car
                    </span>

                    <div class="action-buttons" onclick="event.stopPropagation()">
                        <form th:action="@{/admin/accept-booking}" method="post" style="display:inline;">
                            <input type="hidden" name="bookingId" th:value="${booking.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn-accept" type="submit">Accept</button>
                        </form>

                        <form th:action="@{/admin/reject-booking}" method="post" style="display:inline;">
                            <input type="hidden" name="bookingId" th:value="${booking.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn-reject" type="submit">Reject</button>
                        </form>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(recentBookings)}">
                    No pending bookings for action.
                </div>

            </div>
        </section>
    </main>
</div>

<div id="bookingModal" class="neo-modal-backdrop">
    <div class="neo-modal">
        <div class="neo-modal-header">
            <h2>Booking Details</h2>
            <button type="button" class="neo-close-btn" onclick="closeBookingModal()">×</button>
        </div>

        <div class="neo-form">
            <div>
                <label>User</label>
                <input type="text" id="modalUser" readonly>
            </div>

            <div>
                <label>Car</label>
                <input type="text" id="modalCar" readonly>
            </div>

            <div>
                <label>Status</label>
                <input type="text" id="modalStatus" readonly>
            </div>

            <div>
                <label>Date</label>
                <input type="text" id="modalDate" readonly>
            </div>
        </div>
    </div>
</div>

<div id="bookingManageModal" class="neo-modal-backdrop">
    <div class="neo-modal neo-modal-lg">
        <div class="neo-modal-header">
            <h2>Booking Details</h2>
            <button type="button" class="neo-close-btn" onclick="closeBookingManageModal()">×</button>
        </div>

        <form th:action="@{/admin/bookings/update}" method="post" class="neo-form">
            <input type="hidden" id="modalBookingId" name="id">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <label>Customer</label>
                <input type="text" id="modalBookingCustomer" readonly>
            </div>

            <div>
                <label>Car</label>
                <input type="text" id="modalBookingCar" readonly>
            </div>

            <div>
                <label>Status</label>
                <select id="modalBookingStatus" name="status" required>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Active">Active</option>
                    <option value="Completed">Completed</option>
                    <option value="Returned">Returned</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>

            <div>
                <label>Start Date</label>
                <input type="text" id="modalBookingStart" name="start_date">
            </div>

            <div>
                <label>Return Date</label>
                <input type="text" id="modalBookingReturn" name="return_date">
            </div>

            <div>
                <label>Total Amount</label>
                <input type="text" id="modalBookingTotal" name="total_amount">
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-accept">Update</button>
                <button type="button" class="btn-reject" onclick="submitDeleteBooking()">Delete</button>
            </div>
        </form>

        <form id="deleteBookingForm" th:action="@{/admin/bookings/delete}" method="post" style="display:none;">
            <input type="hidden" id="deleteBookingId" name="id">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </form>
    </div>
</div>

<script>
    function openBookingModal(row) {
        document.getElementById('modalUser').value = row.dataset.user || '';
        document.getElementById('modalCar').value = row.dataset.car || '';
        document.getElementById('modalStatus').value = row.dataset.status || '';
        document.getElementById('modalDate').value = row.dataset.date || '';

        document.getElementById('bookingModal').classList.add('show');
    }

    function closeBookingModal() {
        document.getElementById('bookingModal').classList.remove('show');
    }

    window.addEventListener('click', function (e) {
        const modal = document.getElementById('bookingModal');
        if (e.target === modal) {
            closeBookingModal();
        }
    });
</script>

<script>
    function openBookingManageModal(row) {
        document.getElementById('modalBookingId').value = row.dataset.id || '';
        document.getElementById('deleteBookingId').value = row.dataset.id || '';
        document.getElementById('modalBookingCustomer').value = row.dataset.customer || '';
        document.getElementById('modalBookingCar').value = row.dataset.car || '';
        document.getElementById('modalBookingStatus').value = row.dataset.status || '';
        document.getElementById('modalBookingStart').value = row.dataset.start || '';
        document.getElementById('modalBookingReturn').value = row.dataset.return || '';
        document.getElementById('modalBookingTotal').value = row.dataset.total || '';

        document.getElementById('bookingManageModal').classList.add('show');
    }

    function closeBookingManageModal() {
        document.getElementById('bookingManageModal').classList.remove('show');
    }

    function submitDeleteBooking() {
        const ok = confirm('Are you sure you want to delete this booking?');
        if (ok) {
            document.getElementById('deleteBookingForm').submit();
        }
    }

    window.addEventListener('click', function (e) {
        const modal = document.getElementById('bookingManageModal');
        if (e.target === modal) {
            closeBookingManageModal();
        }
    });
</script>
</body>
</html>
