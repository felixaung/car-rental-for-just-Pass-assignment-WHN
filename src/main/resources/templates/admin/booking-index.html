<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block
            th:replace="/admin/fragments/sidebar :: sidebar('Bookings')"
    ></th:block>

    <main class="dashboard">
        <div class="topbar">
            <h1>Bookings</h1>
        </div>

        <section class="dashboard-grid">
            <div class="panel neo-card">
                <h2>Recent Bookings</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Car</th>
                            <th>Status</th>
                            <th>Start Date</th>
                            <th>Return Date</th>
                            <th>Fee</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}">Car</td>
                            <td>
                                <span class="status pending" th:text="${booking.status}">Pending</span>
                            </td>
                            <td th:text="${booking.start_date}">2026-03-09</td>
                            <td th:text="${booking.return_date}">2026-03-09</td>
                            <td th:text="${booking.total_amount}">0</td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="5">No pending bookings found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="quick-actions">
                <h2>Quick Action</h2>


                    <div class="action-row"
                     th:each="booking : ${recentBookings}"
                     onclick="openBookingModal(this)"
                     th:data-id="${booking.id}"
                     th:data-user="${booking.customer.username}"
                     th:data-car="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}"
                     th:data-status="${booking.status}"
                     th:data-date="${booking.start_date + ' to ' + booking.end_date}">

                    <span class="cell user-cell"
                          th:text="${booking.customer.username}">
                        User
                    </span>

                    <span class="cell car-cell"
                          th:text="${booking.car.carVariant.brand + ' ' + booking.car.carVariant.model}">
                        Car
                    </span>

                    <div class="action-buttons" onclick="event.stopPropagation()">
                        <form th:action="@{/admin/accept-booking}" method="post" style="display:inline;">
                            <input type="hidden" name="bookingId" th:value="${booking.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn-accept" type="submit">Accept</button>
                        </form>

                        <form th:action="@{/admin/reject-booking}" method="post" style="display:inline;">
                            <input type="hidden" name="bookingId" th:value="${booking.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn-reject" type="submit">Reject</button>
                        </form>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(recentBookings)}">
                    No pending bookings for action.
                </div>

            </div>
        </section>
    </main>
</div>

<div id="bookingModal" class="neo-modal-backdrop">
    <div class="neo-modal">
        <div class="neo-modal-header">
            <h2>Booking Details</h2>
            <button type="button" class="neo-close-btn" onclick="closeBookingModal()">×</button>
        </div>

        <div class="neo-form">
            <div>
                <label>User</label>
                <input type="text" id="modalUser" readonly>
            </div>

            <div>
                <label>Car</label>
                <input type="text" id="modalCar" readonly>
            </div>

            <div>
                <label>Status</label>
                <input type="text" id="modalStatus" readonly>
            </div>

            <div>
                <label>Date</label>
                <input type="text" id="modalDate" readonly>
            </div>
        </div>
    </div>
</div>

<script>
    function openBookingModal(row) {
        document.getElementById('modalUser').value = row.dataset.user || '';
        document.getElementById('modalCar').value = row.dataset.car || '';
        document.getElementById('modalStatus').value = row.dataset.status || '';
        document.getElementById('modalDate').value = row.dataset.date || '';

        document.getElementById('bookingModal').classList.add('show');
    }

    function closeBookingModal() {
        document.getElementById('bookingModal').classList.remove('show');
    }

    window.addEventListener('click', function (e) {
        const modal = document.getElementById('bookingModal');
        if (e.target === modal) {
            closeBookingModal();
        }
    });
</script>
</body>
</html>
