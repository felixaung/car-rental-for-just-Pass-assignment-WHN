<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block
            th:replace="/admin/fragments/sidebar :: sidebar('Cars')"
    ></th:block>

    <main class="dashboard">
        <div class="topbar">
            <h1>Cars</h1>

            <a class="neo-link-btn" th:href="@{/admin/cars/creation}">Add Car </a>
        </div>


            <div class="panel neo-card">
                <h2>Car Lists</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Car</th>
                            <th>License Plate</th>
                            <th>Status</th>
                            <th>Brand</th>
                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="car : ${cars}"
                            class="clickable-row"
                            onclick="openCarModal(this)"
                            th:data-id="${car.id}"
                            th:data-engine="${car.engine_no}"
                            th:data-registration="${car.registration_no}"
                            th:data-status="${car.status}"
                            th:data-variant="${car.carVariant.brand + ' ' + car.carVariant.model}">
                            <td th:text="${car.engine_no}"></td>
                            <td th:text="${car.registration_no}">Honda Fit</td>
                            <td>
                                <span class="status approved" th:text="${car.status}"></span>
                            </td>
                            <td th:text="${car.carVariant.brand + ' ' + car.carVariant.model}">Variant</td>
                        </tr>


                        </tbody>
                    </table>
                </div>
            </div>

    </main>
</div>

<div id="carModal" class="neo-modal-backdrop">
    <div class="neo-modal neo-modal-lg">
        <div class="neo-modal-header">
            <h2>Car Details</h2>
            <button type="button" class="neo-close-btn" onclick="closeCarModal()">×</button>
        </div>

        <form th:action="@{/admin/cars/update}" method="post" class="neo-form">
            <input type="hidden" id="modalCarId" name="id">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <label>Engine No</label>
                <input type="text" id="modalEngineNo" name="engine_no" required>
            </div>

            <div>
                <label>Registration No</label>
                <input type="text" id="modalRegistrationNo" name="registration_no" required>
            </div>

            <div>
                <label>Status</label>
                <select id="modalStatus" name="status" required>
                    <option value="Available">Available</option>
                    <option value="Booked">Booked</option>
                    <option value="Rented">Rented</option>
                    <option value="Maintenance">Maintenance</option>
                </select>
            </div>

            <div>
                <label>Variant</label>
                <input type="text" id="modalVariant" readonly>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-accept">Update</button>
                <button type="button" class="btn-reject" onclick="submitDeleteCar()">Delete</button>
            </div>
        </form>

        <form id="deleteCarForm" th:action="@{/admin/cars/delete}" method="post" style="display:none;">
            <input type="hidden" id="deleteCarId" name="id">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </form>
    </div>
</div>

<script>
    function openCarModal(row) {
        document.getElementById('modalCarId').value = row.dataset.id || '';
        document.getElementById('deleteCarId').value = row.dataset.id || '';
        document.getElementById('modalEngineNo').value = row.dataset.engine || '';
        document.getElementById('modalRegistrationNo').value = row.dataset.registration || '';
        document.getElementById('modalStatus').value = row.dataset.status || '';
        document.getElementById('modalVariant').value = row.dataset.variant || '';

        document.getElementById('carModal').classList.add('show');
    }

    function closeCarModal() {
        document.getElementById('carModal').classList.remove('show');
    }

    function submitDeleteCar() {
        const ok = confirm('Are you sure you want to delete this car?');
        if (ok) {
            document.getElementById('deleteCarForm').submit();
        }
    }

    window.addEventListener('click', function (e) {
        const modal = document.getElementById('carModal');
        if (e.target === modal) {
            closeCarModal();
        }
    });
</script>
</body>
</html>
