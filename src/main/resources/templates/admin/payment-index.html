<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block
            th:replace="/admin/fragments/sidebar :: sidebar('Payments')"
    ></th:block>

    <main class="dashboard">
        <div class="topbar">
            <h1>Payments</h1>
            <!-- <input class="search" type="text" placeholder="Search..." /> -->
        </div>



            <div class="panel neo-card">
                <h2>Recent Bookings</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Car</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Amount</th>
                            <th>Payment Status</th>
                        </tr>
                        </thead>


                        <tbody>
                        <tbody>
                    <tr th:each="payment : ${payments}">
                        <td th:text="${payment.booking != null and payment.booking.car != null and payment.booking.car.carVariant != null
            ? payment.booking.car.carVariant.brand + ' ' + payment.booking.car.carVariant.model
            : '-'}">Car</td>
                        <td th:text="${payment.booking != null ? payment.booking.start_date : '-'}">Start</td>
                        <td th:text="${payment.booking != null ? payment.booking.end_date : '-'}">End</td>
                        <td th:text="${payment.amount}">Amount</td>
                        <td th:text="${payment.payment_status}">Status</td>
                    </tr>

                        <tr th:if="${#lists.isEmpty(payments)}">
                            <td colspan="5">No payments found</td>
                        </tr>
                        </tbody>
                        </tbody>

                    </table>
                </div>
            </div>



    </main>
</div>
</body>
</html>
