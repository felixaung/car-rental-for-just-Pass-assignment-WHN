<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <th:block
            th:replace="/admin/fragments/sidebar :: sidebar('Car-Variant')"
    ></th:block>

    <main class="dashboard">
        <div class="topbar">
            <h1>Car Variant</h1>

            <a class="neo-link-btn" th:href="@{/admin/car-variant/creation}">Add Car Variant </a>
        </div>


        <div class="panel neo-card">
            <h2>Car Lists</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Seat</th>
                        <th>Fuel Type</th>
                        <th>Color</th>
                        <th>Price</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="variant : ${carVariant}"
                        class="clickable-row"
                        onclick="openVariantModal(this)"
                        th:data-id="${variant.id}"
                        th:data-brand="${variant.brand}"
                        th:data-model="${variant.model}"
                        th:data-year="${variant.year}"
                        th:data-seat="${variant.seat}"
                        th:data-fuel="${variant.fuelType}"
                        th:data-color="${variant.color}"
                        th:data-price="${variant.pricePerDay}">

                        <td th:text="${variant.brand}">Honda</td>
                        <td th:text="${variant.model}">Fit</td>
                        <td th:text="${variant.year}">2024</td>
                        <td th:text="${variant.seat}">5</td>
                        <td th:text="${variant.fuelType}">Petrol</td>
                        <td th:text="${variant.color}">White</td>
                        <td th:text="${variant.pricePerDay}">50000</td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(carVariant)}">
                        <td colspan="7">No car variants found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<div id="variantModal" class="neo-modal-backdrop">
    <div class="neo-modal neo-modal-lg">
        <div class="neo-modal-header">
            <h2>Car Variant Details</h2>
            <button type="button" class="neo-close-btn" onclick="closeVariantModal()">×</button>
        </div>

        <form th:action="@{/admin/car-variants/update}" method="post" class="neo-form">
            <input type="hidden" id="modalVariantId" name="id">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <label>Brand</label>
                <input type="text" id="modalBrand" name="brand" required>
            </div>

            <div>
                <label>Model</label>
                <input type="text" id="modalModel" name="model" required>
            </div>

            <div>
                <label>Year</label>
                <input type="number" id="modalYear" name="year" required>
            </div>

            <div>
                <label>Seat</label>
                <input type="number" id="modalSeat" name="seat" required>
            </div>

            <div>
                <label>Fuel Type</label>
                <input type="text" id="modalFuelType" name="fuelType" required>
            </div>

            <div>
                <label>Color</label>
                <input type="text" id="modalColor" name="color" required>
            </div>

            <div>
                <label>Price Per Day</label>
                <input type="number" id="modalPricePerDay" name="pricePerDay" required>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-accept">Update</button>
                <button type="button" class="btn-reject" onclick="submitDeleteVariant()">Delete</button>
            </div>
        </form>

        <form id="deleteVariantForm" th:action="@{/admin/car-variant/delete}" method="post" style="display:none;">
            <input type="hidden" id="deleteVariantId" name="id">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </form>
    </div>


    <script>
        function openVariantModal(row) {
            document.getElementById('modalVariantId').value = row.dataset.id || '';
            document.getElementById('deleteVariantId').value = row.dataset.id || '';
            document.getElementById('modalBrand').value = row.dataset.brand || '';
            document.getElementById('modalModel').value = row.dataset.model || '';
            document.getElementById('modalYear').value = row.dataset.year || '';
            document.getElementById('modalSeat').value = row.dataset.seat || '';
            document.getElementById('modalFuelType').value = row.dataset.fuel || '';
            document.getElementById('modalColor').value = row.dataset.color || '';
            document.getElementById('modalPricePerDay').value = row.dataset.price || '';

            document.getElementById('variantModal').classList.add('show');
        }

        function closeVariantModal() {
            document.getElementById('variantModal').classList.remove('show');
        }

        function submitDeleteVariant() {
            const ok = confirm('Are you sure you want to delete this car variant?');
            if (ok) {
                document.getElementById('deleteVariantForm').submit();
            }
        }

        window.addEventListener('click', function (e) {
            const modal = document.getElementById('variantModal');
            if (e.target === modal) {
                closeVariantModal();
            }
        });
    </script>
</body>
</html>
