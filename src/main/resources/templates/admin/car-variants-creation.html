<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Create Car</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-shell">
    <th:block
            th:replace="/admin/fragments/sidebar :: sidebar('Car-Variant')"
    ></th:block>

    <main class="dashboard">
        <div class="topbar">
            <h1>Car Variant Creation</h1>
        </div>

        <section class="neo-modal">

                    <div class="neo-modal-header">
                        <h2>New Car Variant</h2>
                        <a  class="neo-close-btn" th:href="@{/admin/car-variant}">×</a>
                    </div>

                    <form class="neo-form variant-modal-form" th:object="${carVariant}" th:action="@{/admin/car-variant-create}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div>
                            <label for="brand">Brand</label>
                            <input type="text" id="brand" th:field="*{brand}" placeholder="Toyota">
                        </div>

                        <div>
                            <label for="model">Model</label>
                            <input type="text" id="model" th:field="*{model}" placeholder="Corolla">
                        </div>

                        <div>
                            <label for="year">Year</label>
                            <input type="text" id="year" th:field="*{year}" placeholder="2022">
                        </div>

                        <div>
                            <label for="seat">Seat Capacity</label>
                            <input type="text" id="seat" th:field="*{seat}" placeholder="5">
                        </div>

                        <div>
                            <label for="fuelType">Fuel Type</label>
                            <input type="text" id="fuelType" th:field="*{fuelType}" placeholder="Petrol">
                        </div>

                        <div>
                            <label for="color">Color</label>
                            <input type="text" id="color" th:field="*{color}" placeholder="White">
                        </div>

                        <div>
                            <label for="image">Image</label>
                            <input type="file" id="image" th:field="*{image}">

                        </div>

                        <div>
                            <label for="pricePerDay">Price Per Day</label>
                            <input type="number" step="0.01" id="pricePerDay" th:field="*{pricePerDay}" placeholder="50000">
                        </div>

                        <div class="full-width">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" placeholder="Car details..."></textarea>
                        </div>

                        <div class="form-actions full-width">
                            <button type="submit" class="btn-save">Save Variant</button>
                        </div>
                    </form>

        </section>
    </main>
</div>



</body>
</html>
